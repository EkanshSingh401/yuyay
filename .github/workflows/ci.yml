name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd packages/yuyay-lib
          pip install -e ".[dev]"

      - name: Run black
        run: |
          cd packages/yuyay-lib
          black --check .

      - name: Run ruff
        run: |
          cd packages/yuyay-lib
          ruff check .

      - name: Run mypy
        run: |
          cd packages/yuyay-lib
          mypy yuyay/

      - name: Run pytest
        run: |
          cd packages/yuyay-lib
          pytest --cov=yuyay --cov-report=term-missing