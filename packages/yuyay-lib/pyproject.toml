[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "yuyay"
version = "0.1.0"
description = "YUYAY Intelligence Framework"
requires-python = ">=3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
strict = true

[tool.ruff]
line-length = 88

[tool.black]
line-length = 88

[tool.isort]
profile = "black"

[tool.setuptools.packages.find]
where = ["."]
include = ["yuyay*"]

[project.optional-dependencies]
dev = [
    "black>=26.3.1",
    "ruff>=0.15.9",
    "mypy>=1.20.0",
    "pytest>=9.0.2",
    "pytest-cov>=7.1.0",
    "isort>=6.0.1",
]

[[tool.mypy.overrides]]
module = [
    "anthropic",
    "openai",
    "google.generativeai",
    "google",
]
ignore_missing_imports = true